<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>audio-hotkeys — Switch audio devices with one keystroke</title>
<meta name="description" content="A lightweight Windows tray app that switches audio devices and volume with Ctrl+Alt+NumPad. Free and open source.">

<style>
  :root {
    --bg: #0d0d12;
    --surface: #16161d;
    --surface-2: #1f1f2a;
    --border: #3a3a48;
    --border-strong: #6b6b82;
    --text: #f5f5f7;
    --text-sub: #c9c9d4;
    --accent: #7ec8ff;
    --accent-strong: #b3ddff;
    --accent-max: #d6ecff;
    --positive: #7ee2a8;
    --warning: #ffd479;
    --focus: #ffd479;
    /* 로컬 설치 폰트만 사용 — CDN 금지. 없으면 시스템 산세리프로 자연스럽게 폴백. */
    --font-ui: "KyoboHandwriting2019", "Pretendard", "Malgun Gothic", "맑은 고딕",
               system-ui, -apple-system, "Segoe UI", sans-serif;
    --font-mono: "Consolas", "Cascadia Mono", ui-monospace, "Malgun Gothic", monospace;
  }

  * { box-sizing: border-box; }

  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    * { transition: none !important; animation: none !important; }
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 18px;
    line-height: 1.8;
    letter-spacing: 0.02em;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  .wrap { max-width: 940px; margin: 0 auto; padding: 0 20px; }

  a { color: var(--accent); }
  a:hover { color: var(--accent-max); }
  :focus-visible { outline: 3px solid var(--focus); outline-offset: 3px; border-radius: 4px; }

  code, .mono, .ver { font-family: var(--font-mono); }

  /* ---- top bar ---- */
  header {
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 10;
  }
  .bar { display: flex; align-items: center; gap: 16px; min-height: 68px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 10px; margin-right: auto; }
  .brand svg { width: 30px; height: 30px; flex: none; }
  .brand b { font-weight: normal; font-size: 1.25rem; }
  .ver { color: var(--accent); font-size: 0.85rem; }

  /* language switcher — 색만이 아니라 선택 상태를 밑줄로도 표시 */
  .langs { display: flex; gap: 4px; flex-wrap: wrap; }
  .langs button {
    min-height: 40px; padding: 6px 12px;
    background: transparent; color: var(--text-sub);
    border: 1.5px solid transparent; border-radius: 999px;
    font-family: inherit; font-size: 0.92rem; cursor: pointer;
    border-bottom: 3px solid transparent;
  }
  .langs button:hover { color: var(--accent-strong); border-color: var(--border-strong); }
  .langs button[aria-current="true"] {
    color: var(--accent-strong);
    border-bottom-color: var(--accent);
    background: var(--surface-2);
  }

  /* ---- hero ---- */
  .hero { padding: 72px 0 56px; text-align: center; }
  .hero h1 { font-size: 2.2rem; margin: 0 0 12px; font-weight: normal; }
  .tagline { font-size: 1.35rem; color: var(--text-sub); margin: 0 auto 36px; max-width: 34em; }

  .cta { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; align-items: center; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    min-height: 56px; padding: 12px 28px;
    border-radius: 12px; border: 2px solid var(--border-strong);
    background: var(--surface-2); color: var(--text);
    font-family: inherit; font-size: 1.05rem; text-decoration: none;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent-strong); }
  .btn-primary {
    background: var(--accent-strong); color: #000; border-color: var(--accent-strong);
  }
  .btn-primary:hover { background: var(--accent-max); color: #000; border-color: var(--accent-max); }
  .meta { margin-top: 18px; color: var(--text-sub); font-size: 0.95rem; }
  .meta .mono { color: var(--text); }

  /* ---- sections ---- */
  section { padding: 44px 0; border-top: 1px solid var(--border); }
  h2 { font-size: 1.7rem; font-weight: normal; margin: 0 0 8px; color: var(--accent-strong); }
  .sub { color: var(--text-sub); margin: 0 0 28px; }

  .grid { display: grid; gap: 18px; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 22px 24px;
  }
  .card h3 { font-size: 1.35rem; font-weight: normal; margin: 0 0 6px; }
  .card p { margin: 0; color: var(--text-sub); font-size: 0.97rem; }

  /* ---- hotkey table ---- */
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 460px; }
  th, td { text-align: left; padding: 14px 12px; border-bottom: 1px solid var(--border); }
  th { color: var(--text-sub); font-weight: normal; font-size: 0.92rem; }
  td:first-child { white-space: nowrap; }
  kbd {
    font-family: var(--font-mono); font-size: 0.92rem;
    background: var(--surface-2); border: 1px solid var(--border-strong);
    border-radius: 6px; padding: 3px 8px; color: var(--accent);
  }

  .note {
    margin-top: 22px; padding: 16px 20px;
    background: var(--surface); border: 1px solid var(--border);
    border-left: 5px solid var(--warning); border-radius: 12px;
    color: var(--text-sub); font-size: 0.95rem;
  }
  .note b { color: var(--warning); font-weight: normal; }

  /* ---- links ---- */
  .links { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
  .link-card {
    display: flex; flex-direction: column; gap: 4px;
    min-height: 56px; padding: 20px 22px;
    background: var(--surface); border: 2px solid var(--border-strong);
    border-radius: 12px; text-decoration: none; color: var(--text);
  }
  .link-card:hover { border-color: var(--accent); color: var(--accent-strong); }
  .link-card span { color: var(--text-sub); font-size: 0.9rem; overflow-wrap: anywhere; }
  .link-card:hover span { color: var(--text-sub); }

  /* ---- support / 후원 ---- */
  .support-card {
    display: flex; gap: 26px; align-items: center; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px;
  }
  /* QR은 밝은 바탕이라야 스캔이 잘 된다 — 흰 프레임을 직접 씌운다. */
  .qr-frame { background: #fff; border-radius: 12px; padding: 14px; flex: none; line-height: 0; }
  .qr-frame img { display: block; width: 216px; height: 216px; }
  .qr-meta { display: flex; flex-direction: column; gap: 6px; min-width: 220px; flex: 1; }
  .qr-meta b { font-weight: normal; font-size: 1.25rem; color: var(--accent-strong); }
  .qr-meta span { color: var(--text-sub); font-size: 0.97rem; }
  @media (max-width: 560px) {
    .support-card { justify-content: center; text-align: center; }
    .qr-meta { align-items: center; }
  }

  footer {
    border-top: 1px solid var(--border); padding: 32px 0 48px;
    color: var(--text-sub); font-size: 0.9rem; text-align: center;
  }

  @media (max-width: 640px) {
    body { font-size: 17px; }
    .hero { padding: 48px 0 40px; }
    .hero h1 { font-size: 1.8rem; }
    .tagline { font-size: 1.15rem; }
    .btn { width: 100%; }
  }
</style>
</head>

const LANGS = ["en", "ko", "ja", "zh", "vi"];

function applyLang(code) {
  const dict = I18N[code] || I18N.en;
  document.documentElement.lang = code;
  document.title = dict._title;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const val = dict[el.dataset.i18n];
    if (val) el.textContent = val;
  });
  document.querySelectorAll(".langs button").forEach(b => {
    b.setAttribute("aria-current", String(b.dataset.lang === code));
  });
  try { localStorage.setItem("ah-lang", code); } catch (e) {}
}

function initialLang() {
  try {
    const saved = localStorage.getItem("ah-lang");
    if (saved && LANGS.includes(saved)) return saved;
  } catch (e) {}
  for (const pref of navigator.languages || [navigator.language || "en"]) {
    const base = String(pref).toLowerCase().split("-")[0];
    if (LANGS.includes(base)) return base;
  }
  return "en";
}

document.querySelectorAll(".langs button").forEach(b => {
  b.addEventListener("click", () => applyLang(b.dataset.lang));
});

applyLang(initialLang());
</script>
